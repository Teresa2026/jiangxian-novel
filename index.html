<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>潮聲書齋｜深海圖書館</title>
<style>
  :root {
    --abyss: #10152B;
    --navy: #232F55;
    --pearl: #EFEDE6;
    --pearl-dim: #A9AFC4;
    --aqua: #7FDEE2;
    --gold: #D4B36A;
    --amethyst: #A98BD6;
    --line: rgba(127,222,226,0.22);
    --serif: "Noto Serif TC", "Songti TC", "SimSun", "PMingLiU", serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  html, body { height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(60vw 40vh at 80% -5%, rgba(127,222,226,0.10), transparent 60%),
      radial-gradient(50vw 40vh at 10% 30%, rgba(169,139,214,0.08), transparent 60%),
      linear-gradient(180deg, #131A35 0%, var(--abyss) 45%, #0B0F20 100%);
    color: var(--pearl);
    font-family: var(--serif);
    line-height: 1.9;
    letter-spacing: 0.04em;
  }

  /* ── 通用：全螢幕視圖切換 ── */
  .view { position: fixed; inset: 0; display: none; z-index: 1; }
  .view.active { display: block; animation: viewIn 0.5s ease; }
  @keyframes viewIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── 上浮珍珠光點 ── */
  .bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bubbles span {
    position: absolute; bottom: -3vh; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, var(--aqua) 55%, transparent 75%);
    box-shadow: 0 0 12px rgba(127,222,226,0.8);
    opacity: 0; animation: rise linear infinite;
  }
  @keyframes rise {
    0% { transform: translateY(0); opacity: 0; }
    12% { opacity: 0.8; } 85% { opacity: 0.45; }
    100% { transform: translateY(-108vh) translateX(3vw); opacity: 0; }
  }

  /* ── 游標光波 ── */
  #cursor-fx { position: fixed; inset: 0; pointer-events: none; z-index: 400; overflow: hidden; }
  .trail-dot {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(127,222,226,0.6) 60%, transparent);
    box-shadow: 0 0 10px rgba(127,222,226,0.7);
    transform: translate(-50%,-50%); animation: trailFade 0.9s ease-out forwards;
  }
  @keyframes trailFade { to { opacity: 0; transform: translate(-50%,-50%) scale(0.2); } }
  .ripple-ring {
    position: absolute; width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid rgba(127,222,226,0.7);
    box-shadow: 0 0 16px rgba(127,222,226,0.4);
    transform: translate(-50%,-50%); animation: rippleGrow 1s ease-out forwards;
  }
  @keyframes rippleGrow { to { width: 130px; height: 130px; opacity: 0; } }

  /* ── 入水轉場 ── */
  .dive-fx { position: fixed; inset: 0; z-index: 500; pointer-events: none; display: none; overflow: hidden; }
  .dive-fx.play { display: block; }
  .dive-fx .flash {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 62%, rgba(127,222,226,0.30), rgba(16,21,43,0.92) 72%);
    animation: diveFlash 0.75s ease forwards;
  }
  @keyframes diveFlash { 0% { opacity: 0; } 35% { opacity: 1; } 100% { opacity: 0; } }
  .dive-fx .b {
    position: absolute; bottom: -30px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, rgba(127,222,226,0.85) 55%, transparent 78%);
    box-shadow: 0 0 14px rgba(127,222,226,0.8);
    animation: diveRise 0.75s ease-in forwards;
  }
  @keyframes diveRise { to { transform: translateY(-112vh); opacity: 0; } }

  /* ── 潮聲按鈕（固定右上）── */
  .sound-btn {
    position: fixed; top: 1rem; right: 1.2rem; z-index: 300;
    background: rgba(16,21,43,0.6); backdrop-filter: blur(4px);
    border: 1px solid var(--line); border-radius: 999px;
    color: var(--pearl-dim); font-family: var(--serif);
    font-size: 0.8rem; letter-spacing: 0.12em;
    padding: 0.22rem 0.95rem; cursor: pointer;
    transition: color .2s, border-color .2s, box-shadow .2s;
  }
  .sound-btn:hover { color: var(--aqua); }
  .sound-btn.on { color: var(--aqua); border-color: rgba(127,222,226,0.6); box-shadow: 0 0 12px rgba(127,222,226,0.35); }

  a:focus-visible, button:focus-visible, [tabindex]:focus-visible { outline: 2px solid var(--aqua); outline-offset: 3px; }

  /* ════════ 視圖一：入口 ════════ */
  #view-entrance { display: none; }
  #view-entrance.active { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.2rem; text-align: center; padding: 2rem; }
  .rays { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .rays i {
    position: absolute; top: -22%; width: 90px; height: 75%;
    background: linear-gradient(180deg, rgba(127,222,226,0.15), transparent 82%);
    transform: rotate(13deg); filter: blur(7px);
    animation: rayPulse 9s ease-in-out infinite;
  }
  @keyframes rayPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  .entrance-eyebrow { color: var(--amethyst); font-size: 0.85rem; letter-spacing: 0.6em; }
  .entrance-title {
    font-size: clamp(2.2rem, 5.5vw, 3.6rem); font-weight: 700; letter-spacing: 0.3em;
    text-shadow: 0 0 24px rgba(127,222,226,0.55), 0 0 60px rgba(127,222,226,0.25);
  }
  .entrance-intro { color: var(--pearl-dim); max-width: 30rem; font-size: 0.95rem; }

  .door {
    position: relative; width: 190px; height: 285px; margin: 1.6rem 0 0.8rem;
    border: 2px solid rgba(212,179,106,0.65);
    border-radius: 999px 999px 6px 6px;
    background: linear-gradient(180deg, #1B2547, #12182F);
    box-shadow: 0 0 34px rgba(127,222,226,0.18), inset 0 0 40px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: box-shadow 0.35s ease;
    overflow: hidden;
  }
  .door::before { /* 門縫透光 */
    content: ""; position: absolute; top: 8%; bottom: 0; left: 50%;
    width: 2px; transform: translateX(-50%);
    background: linear-gradient(180deg, transparent, var(--aqua), rgba(127,222,226,0.9));
    box-shadow: 0 0 18px rgba(127,222,226,0.9);
    opacity: 0.6; transition: opacity 0.35s ease, box-shadow 0.35s ease;
  }
  .door::after { /* 兩扇門上的珍珠門把 */
    content: ""; position: absolute; top: 55%; left: 50%; transform: translateX(-50%);
    width: 46px; height: 9px;
    background:
      radial-gradient(circle at 6px 50%, #fff 0 2.5px, #9FB9C9 4px, transparent 5px),
      radial-gradient(circle at 40px 50%, #fff 0 2.5px, #9FB9C9 4px, transparent 5px);
    filter: drop-shadow(0 0 6px rgba(127,222,226,0.9));
  }
  .door:hover { box-shadow: 0 0 55px rgba(127,222,226,0.4), inset 0 0 40px rgba(127,222,226,0.10); }
  .door:hover::before { opacity: 1; box-shadow: 0 0 30px rgba(127,222,226,1); }
  .door .arch-line { position: absolute; inset: 10px 10px 0; border: 1px solid rgba(212,179,106,0.35); border-bottom: none; border-radius: 999px 999px 0 0; }

  .enter-btn {
    background: none; cursor: pointer;
    font-family: var(--serif); font-size: 0.98rem; letter-spacing: 0.3em;
    color: var(--pearl);
    border: 1px solid var(--aqua); border-radius: 999px;
    padding: 0.5rem 2.2rem;
    box-shadow: 0 0 18px rgba(127,222,226,0.25), inset 0 0 12px rgba(127,222,226,0.10);
    transition: box-shadow .25s, color .25s;
  }
  .enter-btn:hover { color: var(--aqua); box-shadow: 0 0 28px rgba(127,222,226,0.5), inset 0 0 16px rgba(127,222,226,0.2); }

  /* ════════ 視圖二：宮殿書庫大廳 ════════ */
  #view-hall {
    background:
      radial-gradient(70vw 34vh at 50% 0%, rgba(255,246,220,0.95), transparent 72%),
      linear-gradient(180deg, #FBF7EC 0%, #F3EBD8 42%, #E5D9BA 100%);
  }
  .hall-nav {
    position: absolute; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: baseline; gap: 1.6rem;
    padding: 1rem 1.4rem;
  }
  .hall-nav .brand { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.32em; color: #4A3B1E; text-shadow: 0 0 14px rgba(201,168,92,0.45); }
  .hall-nav .brand em { font-style: normal; color: #B08A3E; }
  .hall-nav button {
    background: none; border: none; cursor: pointer;
    font-family: var(--serif); font-size: 0.85rem; letter-spacing: 0.18em;
    color: #8A7648; padding: 0.2rem 0;
  }
  .hall-nav button:hover { color: #B08A3E; text-shadow: 0 0 8px rgba(201,168,92,0.6); }

  .cornice {
    position: absolute; top: 54px; left: 0; right: 0; height: 10px; z-index: 4;
    border-top: 2px solid rgba(176,138,62,0.7);
    border-bottom: 1px solid rgba(176,138,62,0.4);
  }
  .arc-legend {
    position: absolute; top: 72px; width: 100%; text-align: center; z-index: 6;
    color: #8A6F35; font-size: 0.82rem; letter-spacing: 0.35em;
    text-shadow: 0 0 10px rgba(255,240,200,0.9);
  }

  .scene { position: absolute; inset: 0; perspective: 940px; perspective-origin: 50% 46%; overflow: hidden; }
  .floor {
    position: absolute; left: -30%; right: -30%; bottom: -16%; height: 56%;
    background:
      /* 光暈 */
      radial-gradient(ellipse at 50% 0%, rgba(201,168,92,0.26), transparent 60%),
      /* 方格金縫（鑲嵌石板）*/
      repeating-linear-gradient(90deg, rgba(176,138,62,0.30) 0 2px, transparent 2px 150px),
      repeating-linear-gradient(0deg,  rgba(176,138,62,0.30) 0 2px, transparent 2px 110px),
      /* 交錯石板的深淺 */
      repeating-linear-gradient(90deg, rgba(176,138,62,0.05) 0 150px, rgba(255,252,240,0.05) 150px 300px),
      /* 大理石雲紋 */
      radial-gradient(220px 60px at 22% 55%, rgba(255,255,255,0.55), transparent 70%),
      radial-gradient(260px 70px at 71% 78%, rgba(255,255,255,0.4), transparent 70%),
      radial-gradient(180px 50px at 55% 30%, rgba(190,168,120,0.22), transparent 70%),
      /* 大理石斜向石脈 */
      repeating-linear-gradient(63deg,  rgba(255,255,255,0.35) 0 2px, transparent 2px 96px),
      repeating-linear-gradient(-47deg, rgba(160,138,95,0.18)  0 1px, transparent 1px 64px),
      repeating-linear-gradient(21deg,  rgba(176,138,62,0.10)  0 1px, transparent 1px 130px),
      linear-gradient(180deg, #F2E9D1, #D9CBA2);
    border-top: 1px solid rgba(176,138,62,0.5);
    transform: rotateX(59deg); transform-origin: top center;
    box-shadow: inset 0 30px 50px rgba(90,70,30,0.22);
  }
  .floor .gloss { /* 拋光大理石的反光 */
    position: absolute; inset: 0; display: block; pointer-events: none;
    background:
      linear-gradient(180deg, rgba(70,55,20,0.30), transparent 13%),
      linear-gradient(100deg, transparent 38%, rgba(255,255,255,0.22) 47%, transparent 56%),
      radial-gradient(48% 32% at 50% 52%, rgba(255,255,255,0.26), transparent 72%),
      linear-gradient(180deg, transparent 62%, rgba(255,252,240,0.28));
  }
  .floor::before { /* 中央鑲嵌圓花 */
    content: ""; position: absolute; left: 50%; top: 16%;
    width: 420px; height: 420px; transform: translateX(-50%);
    border-radius: 50%;
    border: 2px solid rgba(176,138,62,0.55);
    background:
      radial-gradient(circle, rgba(176,138,62,0.20) 0 26px, transparent 26px 30px,
        rgba(176,138,62,0.45) 30px 32px, transparent 32px 96px,
        rgba(176,138,62,0.45) 96px 99px, transparent 99px 150px,
        rgba(176,138,62,0.35) 150px 152px, transparent 152px),
      repeating-conic-gradient(rgba(176,138,62,0.16) 0 7deg, transparent 7deg 30deg);
    box-shadow: 0 0 30px rgba(176,138,62,0.20), inset 0 0 40px rgba(255,250,235,0.4);
  }
  .floor::after { /* 圓花外的四角飾線 */
    content: ""; position: absolute; left: 50%; top: 16%;
    width: 560px; height: 560px; transform: translateX(-50%) rotate(45deg);
    border: 1.5px solid rgba(176,138,62,0.35);
  }

  /* 半弧形環繞書牆 */
  .arc { position: absolute; left: 50%; top: 5%; height: 84vh; transform-style: preserve-3d; z-index: 2; will-change: transform; }
  .panel {
    position: absolute; left: -118px; top: 0; width: 236px; height: 100%;
    transform: rotateY(var(--a)) translateZ(-838px);
    transform-style: preserve-3d;
  }
  .pflip {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
    transition: transform 0.9s ease;
    transition-delay: var(--fd, 0s);
  }
  .arc.flipped .pflip { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    background: linear-gradient(180deg, #F8F2E1, #ECE0C2);
    border: 1px solid rgba(176,138,62,0.75);
    box-shadow: inset 0 0 22px rgba(176,138,62,0.16), 0 12px 26px rgba(120,95,40,0.20);
    display: flex; flex-direction: column; gap: 8px; padding: 9px 8px;
  }
  .face.back { transform: rotateY(180deg); }
  .face::before { /* 頂部拱飾 */
    content: ""; flex: 0 0 13px;
    border: 1px solid rgba(176,138,62,0.5); border-bottom: none;
    border-radius: 999px 999px 0 0;
  }

  /* 密室拉桿 */
  .lever {
    position: absolute; right: 3vw; bottom: 14%; z-index: 26;
    width: 56px; height: 100px;
    background: none; border: none; cursor: pointer; padding: 0;
  }
  .lever .plate {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 36px; height: 14px; border-radius: 7px;
    background: linear-gradient(180deg, #D9BC79, #8A6F35);
    box-shadow: 0 2px 8px rgba(90,70,30,0.45);
    display: block;
  }
  .lever .arm {
    position: absolute; bottom: 10px; left: 50%;
    width: 7px; height: 58px; margin-left: -3.5px; border-radius: 4px;
    background: linear-gradient(90deg, #C9A85C, #8A6F35);
    transform-origin: bottom center; transform: rotate(-26deg);
    transition: transform 0.5s ease;
    box-shadow: 0 0 8px rgba(176,138,62,0.4);
    display: block;
  }
  .lever .knob {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    width: 17px; height: 17px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #FFF7E0, #D9BC79 45%, #8A6F35 85%);
    box-shadow: 0 0 10px rgba(212,179,106,0.7);
    display: block;
    transition: box-shadow 0.25s;
  }
  .lever:hover .knob { box-shadow: 0 0 18px rgba(212,179,106,1); }
  .lever.pulled .arm { transform: rotate(26deg); }

  .level {
    flex: 1; position: relative; min-height: 0;
    background: linear-gradient(180deg, #17214B, #0E1530);
    border: 1px solid rgba(201,168,92,0.65);
    border-radius: 4px;
    display: flex; align-items: flex-end; justify-content: flex-end; gap: 3px;
    padding: 0 5px 8px;
    overflow: hidden;
  }
  .level::after { /* 金色層板 */
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 6px;
    background: linear-gradient(180deg, #C9A85C, #8A6F35);
    border-radius: 0 0 3px 3px;
  }


  /* ── 機關拉桿：翻轉書櫃 ── */
  .lever { position: absolute; right: 2.2rem; bottom: 2.6rem; width: 66px; height: 104px; z-index: 26; cursor: pointer; }
  .lever::before { /* 黃銅底座 */
    content: ""; position: absolute; inset: 0 6px 16px;
    border: 1.5px solid rgba(176,138,62,0.75); border-radius: 9px;
    background: linear-gradient(180deg, #F5EDD8, #E0D0A6);
    box-shadow: 0 4px 14px rgba(120,95,40,0.35), inset 0 0 10px rgba(176,138,62,0.28);
  }
  .lever .slot {
    position: absolute; left: 50%; top: 12px; transform: translateX(-50%);
    width: 10px; height: 56px; border-radius: 6px;
    background: linear-gradient(180deg, #6B551F, #3F3213);
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.7), 0 0 0 3px rgba(201,168,92,0.85);
  }
  .lever .stick {
    position: absolute; left: 50%; bottom: 38px; width: 6px; height: 54px; margin-left: -3px;
    transform-origin: bottom center; transform: rotate(-24deg);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: linear-gradient(90deg, #8A6F35, #DDC183, #8A6F35);
    border-radius: 3px;
  }
  .lever .knob {
    position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    width: 17px; height: 17px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #FFF3D6, #E3C77E 50%, #A98443 85%);
    box-shadow: 0 0 10px rgba(212,179,106,0.85), 0 0 22px rgba(212,179,106,0.35);
  }
  .lever:hover .knob { box-shadow: 0 0 16px rgba(212,179,106,1), 0 0 30px rgba(212,179,106,0.5); }
  .lever.pulled .stick { transform: rotate(24deg); }
  .lever .lever-label {
    position: absolute; bottom: 0; width: 100%; text-align: center;
    font-size: 0.62rem; letter-spacing: 0.42em; color: #8A6F35;
  }

  .v1 { --bg: linear-gradient(175deg, #29365F, #182142); }
  .v2 { --bg: linear-gradient(175deg, #302A58, #1F1C42); }
  .v3 { --bg: linear-gradient(175deg, #1F4058, #132A3C); }
  .v4 { --bg: linear-gradient(175deg, #2C3A6E, #1A2340); }
  .spine {
    position: relative;
    writing-mode: vertical-rl;
    display: flex; align-items: center; justify-content: center;
    height: var(--sh, 84%); width: var(--sw, 42px);
    flex-shrink: 0;
    background: var(--bg);
    border: 1px solid rgba(212,179,106,0.4);
    border-radius: 3px 3px 2px 2px;
    cursor: pointer;
    font-size: 1.05rem; font-weight: 700; letter-spacing: 0.22em;
    color: var(--pearl);
    text-shadow: 0 0 8px rgba(127,222,226,0.35);
    padding: 7px 0;
    box-shadow: inset 1px 0 4px rgba(255,255,255,0.08), inset -2px 0 6px rgba(0,0,0,0.4), 0 0 8px rgba(127,222,226,0.12);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    overflow: hidden;
  }
  .spine::after {
    content: ""; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #D8E6EA 45%, #8FB4C4 80%);
    box-shadow: 0 0 8px rgba(127,222,226,0.85);
  }
  .spine.ongoing::before {
    content: ""; position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--aqua);
    box-shadow: 0 0 9px rgba(127,222,226,0.95);
    animation: shimmer 2.6s ease-in-out infinite;
  }
  @keyframes shimmer { 0%, 100% { filter: brightness(1); opacity: 0.9; } 50% { filter: brightness(1.5); opacity: 1; } }
  .spine:hover, .spine:focus-visible {
    transform: translateZ(30px) translateY(-5px);
    box-shadow: 0 12px 22px rgba(0,0,0,0.4), 0 0 22px rgba(127,222,226,0.5),
      inset 1px 0 4px rgba(255,255,255,0.08), inset -2px 0 6px rgba(0,0,0,0.4);
  }
  .spine.filler { pointer-events: none; opacity: 0.55; border-color: rgba(212,179,106,0.2); }
  .spine.filler::after { display: none; }

  /* ════════ 視圖三：封面頁 ════════ */
  .page-inner { max-width: 46rem; margin: 0 auto; padding: 3.2rem 6vw 4rem; height: 100%; overflow-y: auto; }
  .back-btn {
    background: none; border: none; cursor: pointer;
    font-family: var(--serif); font-size: 0.9rem; color: var(--pearl-dim);
    letter-spacing: 0.2em; margin-bottom: 2.2rem; padding: 0.3rem 0;
  }
  .back-btn:hover { color: var(--aqua); text-shadow: 0 0 10px rgba(127,222,226,0.5); }

  .book-view { display: flex; gap: 2.6rem; align-items: flex-start; }
  .cover {
    position: relative; flex-shrink: 0;
    width: 215px; aspect-ratio: 2 / 3;
    background: var(--bg);
    border: 1px solid rgba(212,179,106,0.55);
    border-radius: 6px 12px 12px 6px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.5), 0 0 26px rgba(127,222,226,0.15);
    overflow: hidden; will-change: transform;
  }
  .cover .cover-frame { position: absolute; inset: 12px; border: 1px solid rgba(212,179,106,0.5); border-radius: 4px; pointer-events: none; }
  .cover .cover-pearl {
    position: absolute; left: 50%; bottom: 26px; transform: translateX(-50%);
    width: 12px; height: 12px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #D8E6EA 45%, #8FB4C4 80%);
    box-shadow: 0 0 12px rgba(127,222,226,0.9);
  }
  .cover-title {
    position: absolute; top: 34px; left: 50%; transform: translateX(-50%);
    writing-mode: vertical-rl; max-height: 62%;
    font-size: 1.45rem; font-weight: 700; letter-spacing: 0.3em;
    text-shadow: 0 0 16px rgba(127,222,226,0.5);
  }
  .sheen {

  /* ── 手機：改為平面直排書櫃 ── */

    .floor { display: none; }
    .arc { position: static; height: auto; transform: none; display: flex; flex-wrap: wrap; gap: 8px; }
    .panel { position: relative; left: auto; width: calc(50% - 4px); height: 300px; transform: none; }

</style>

<body>

  <div class="door" id="door" role="button" tabindex="0" aria-label="進入書庫">

<!-- ══ 視圖二：宮殿書庫大廳 ══ -->

  <div class="cornice" aria-hidden="true"></div>

  <div class="scene">
    <div class="floor" aria-hidden="true"><i class="gloss"></i></div>

    </button>

    <button class="back-btn" onclick="showView('view-hall')">← 回到書庫</button>

      <div class="pearl-badge">絳弦</div>
      <div class="about-text">
        <p>筆名「絳弦」，一隻棲在深海圖書館裡的海妖，負責替每一冊發光的故事撢灰、點燈。偏愛海的顏色、珍珠的光，還有書頁翻動的聲音。</p>
        <p>長篇不定期上架新章，短篇隨潮汐入庫。想收到新書消息或交流，歡迎來信：<strong>jiangxian0181@gmail.com</strong></p>
      </div>
    </div>
  </div>
</section>

<script>
/* ============================================================
   作品內容由外部檔案載入，更新小說「不需要」修改本檔：
   - works.json  = 作品目錄（書名、簡介、章節清單）
   - content/    = 每一章、每一篇 = 一個 .txt 純文字檔
   ============================================================ */
let novels = [], stories = [];

const finePointer = window.matchMedia("(pointer: fine)").matches;
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ── 視圖切換 ── */
function showView(id) {
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === id));
}

/* ── 上浮光點 ── */
(function () {
  const wrap = document.getElementById("bubbles");
  for (let i = 0; i < 16; i++) {
    const s = document.createElement("span");
    const size = 4 + Math.random() * 6;
    s.style.left = Math.random() * 100 + "vw";
    s.style.width = size + "px"; s.style.height = size + "px";
    s.style.animationDuration = 14 + Math.random() * 16 + "s";
    s.style.animationDelay = Math.random() * 18 + "s";
    wrap.appendChild(s);
  }
})();

/* ── 游標光波 ── */
(function () {
  if (!finePointer || reduceMotion) return;
  const fx = document.getElementById("cursor-fx");
  let last = 0;
  window.addEventListener("mousemove", e => {
    const now = performance.now();
    if (now - last < 45) return;
    last = now;
    const d = document.createElement("span");
    d.className = "trail-dot";
    d.style.left = e.clientX + "px"; d.style.top = e.clientY + "px";
    fx.appendChild(d); setTimeout(() => d.remove(), 900);
  });
  window.addEventListener("click", e => {
    const r = document.createElement("span");
    r.className = "ripple-ring";
    r.style.left = e.clientX + "px"; r.style.top = e.clientY + "px";
    fx.appendChild(r); setTimeout(() => r.remove(), 1000);
  });
})();

/* ── 入水轉場 ── */
const diveFx = document.getElementById("dive-fx");
function diveInto(open) {
  if (reduceMotion) { open(); return; }
  diveFx.innerHTML = '<div class="flash"></div>';
  for (let i = 0; i < 14; i++) {
    const b = document.createElement("span");
    b.className = "b";
    const size = 6 + Math.random() * 12;
    b.style.left = (5 + Math.random() * 90) + "vw";
    b.style.width = size + "px"; b.style.height = size + "px";
    b.style.animationDelay = (Math.random() * 0.18) + "s";
    diveFx.appendChild(b);
  }
  diveFx.classList.add("play");
  setTimeout(open, 320);
  setTimeout(() => { diveFx.classList.remove("play"); diveFx.innerHTML = ""; }, 950);
}

/* ── 潮聲（Web Audio 合成）── */
(function () {
  const btn = document.getElementById("sound-toggle");
  let ctx = null, master = null, on = false;
  function build() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value = 0; master.connect(ctx.destination);
    const len = ctx.sampleRate * 4;
    const buf = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource(); noise.buffer = buf; noise.loop = true;
    const lp = ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 420; lp.Q.value = 0.6;
    const waveGain = ctx.createGain(); waveGain.gain.value = 0.10;
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
    const lfoGain = ctx.createGain(); lfoGain.gain.value = 0.06;
    lfo.connect(lfoGain); lfoGain.connect(waveGain.gain);
    noise.connect(lp); lp.connect(waveGain); waveGain.connect(master);
    noise.start(); lfo.start();
    [130.8, 196.0].forEach((f, i) => {
      const o = ctx.createOscillator(); o.type = "sine"; o.frequency.value = f;
      const g = ctx.createGain(); g.gain.value = 0.012;
      const vib = ctx.createOscillator(); vib.frequency.value = 0.15 + i * 0.07;
      const vibG = ctx.createGain(); vibG.gain.value = 1.6;
      vib.connect(vibG); vibG.connect(o.frequency);
      o.connect(g); g.connect(master); o.start(); vib.start();
    });
  }
  btn.addEventListener("click", e => {
    e.stopPropagation();
    if (!ctx) build();
    if (ctx.state === "suspended") ctx.resume();
    on = !on;
    master.gain.setTargetAtTime(on ? 1 : 0, ctx.currentTime, 0.8);
    btn.classList.toggle("on", on);
    btn.setAttribute("aria-pressed", on);
    btn.textContent = on ? "≋ 潮聲・開" : "≋ 潮聲";
  });
})();

/* ── 封面流光傾斜 ── */
function enableTilt(card) {
  const sheen = document.createElement("span");
  sheen.className = "sheen";
  card.appendChild(sheen);
  if (!finePointer || reduceMotion) return;
  card.addEventListener("mousemove", e => {
    const r = card.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width;
    const y = (e.clientY - r.top) / r.height;
    card.style.setProperty("--mx", (x * 100) + "%");
    card.style.setProperty("--my", (y * 100) + "%");
    card.style.transform =
      "perspective(700px) rotateX(" + ((0.5 - y) * 6).toFixed(2) + "deg) rotateY(" + ((x - 0.5) * 8).toFixed(2) + "deg)";
  });
  card.addEventListener("mouseleave", () => { card.style.transform = ""; });
}

/* ── 建立 3D 書架 ── */
function makeSpine(title, variant, ongoing, onOpen) {
  const b = document.createElement("div");
  b.className = "spine v" + variant + (ongoing ? " ongoing" : "");
  b.setAttribute("role", "button");
  b.setAttribute("tabindex", "0");
  b.textContent = title;
  b.addEventListener("click", () => diveInto(onOpen));
  b.addEventListener("keydown", e => { if (e.key === "Enter") diveInto(onOpen); });
  return b;
}
function makeFiller(seed) {
  const b = document.createElement("div");
  b.className = "spine filler v" + ((seed % 4) + 1);
  b.style.setProperty("--sw", (24 + (seed * 7) % 20) + "px");
  b.style.setProperty("--sh", (58 + (seed * 13) % 32) + "%");
  b.setAttribute("aria-hidden", "true");
  return b;
}

/* 雙面環繞書牆：正面原創區、背面二創區（works.json 中 "zone": "二創" 的作品放背面）
   12 片書櫃板，各轉 16 度，共約 180 度包圍觀者；作品由右至左、先上層後下層混排 */
function buildArc() {
  const arc = document.getElementById("arc");
  arc.innerHTML = "";
  const SEG = 12, STEP = 16;
  const sides = { front: [], back: [] };
  ["front", "back"].forEach(side => {
    const wrap = document.createElement("div");
    wrap.className = "arc-side " + side;
    for (let p = 0; p < SEG; p++) {
      const panel = document.createElement("div");
      panel.className = "panel";
      const base = (p - (SEG - 1) / 2) * STEP + (side === "back" ? 180 : 0);
      panel.style.setProperty("--a", base + "deg");
      const up = document.createElement("div");
      up.className = "level upper";
      const low = document.createElement("div");
      low.className = "level lower";
      panel.appendChild(up);
      panel.appendChild(low);
      wrap.appendChild(panel);
      sides[side].push({ up: up, low: low });
    }
    arc.appendChild(wrap);
  });

  /* 書目合併：長篇在前、短篇在後，zone 決定正反面 */
  const catalog = [];
  novels.forEach((n, i) => catalog.push({ kind: "novel", idx: i, item: n }));
  stories.forEach((s, i) => catalog.push({ kind: "story", idx: i, item: s }));
  const zones = {
    front: catalog.filter(e => (e.item.zone || "原創") !== "二創"),
    back:  catalog.filter(e => (e.item.zone || "原創") === "二創")
  };

  ["front", "back"].forEach(side => {
    const panels = sides[side];
    zones[side].forEach((e, i) => {
      /* 第一本在最右邊書櫃的上層，依序往左；上層滿了換下層 */
      const level = Math.floor(i / SEG) % 2 === 0 ? "up" : "low";
      const p = SEG - 1 - (i % SEG);
      const ongoing = e.kind === "novel" && e.item.status !== "已完結";
      const b = makeSpine(e.item.title, ((e.kind === "novel" ? e.idx : e.idx + 2) % 4) + 1, ongoing, () => openBook(e.kind, e.idx));
      b.style.setProperty("--sw", (40 + (i * 9) % 10) + "px");
      b.style.setProperty("--sh", (82 + (i * 11) % 12) + "%");
      panels[p][level].insertBefore(b, panels[p][level].firstChild);
    });
    /* 裝飾書補在作品左側，讓真書維持靠右 */
    panels.forEach((pl, pi) => {
      ["up", "low"].forEach((lv, li) => {
        const lvl = pl[lv];
        const target = 5 - lvl.children.length;
        for (let f = 0; f < target; f++) {
          const filler = makeFiller(pi * 13 + li * 7 + f * 3 + 2);
          lvl.insertBefore(filler, lvl.firstChild);
        }
      });
    });
  });
}

fetch("works.json")
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    novels = data.novels || [];
    stories = data.stories || [];
    buildArc();
  })
  .catch(() => {
    const scene = document.querySelector("#view-hall .scene");
    const note = document.createElement("p");
    note.style.cssText = "position:absolute; top:42%; width:100%; text-align:center; color:#8A6F35; padding:0 8vw; font-size:0.95rem; z-index:30; letter-spacing:0.08em;";
    note.textContent = "讀不到 works.json——若你是直接雙擊開啟本檔案，這是瀏覽器的安全限制；上傳到 GitHub Pages 後即可正常顯示（詳見使用說明.txt）。";
    scene.appendChild(note);
  });

/* 滑鼠環視＋機關翻轉：共用同一組平滑旋轉 */
let flipped = false;
const arcEl = document.getElementById("arc");
let lookTarget = 0, lookCurrent = 0, lookRaf = null;
function lookStep() {
  const goal = lookTarget + (flipped ? 180 : 0);
  lookCurrent += (goal - lookCurrent) * 0.06;
  arcEl.style.transform = "rotateY(" + lookCurrent.toFixed(2) + "deg)";
  if (Math.abs(goal - lookCurrent) > 0.05) {
    lookRaf = requestAnimationFrame(lookStep);
  } else {
    lookRaf = null;
  }
}
function kickLook() { if (!lookRaf) lookRaf = requestAnimationFrame(lookStep); }
if (finePointer && !reduceMotion) {
  document.querySelector("#view-hall .scene").addEventListener("mousemove", e => {
    lookTarget = (e.clientX / window.innerWidth - 0.5) * 52;
    kickLook();
  });
}

/* 機關拉桿：翻轉書櫃到另一面 */
(function () {
  const lever = document.getElementById("flip-lever");
  const legend = document.getElementById("arc-legend");
  function flip() {
    flipped = !flipped;
    lever.classList.toggle("pulled", flipped);
    arcEl.classList.toggle("flipped", flipped);
    if (reduceMotion) {
      arcEl.style.transform = "rotateY(" + (flipped ? 180 : 0) + "deg)";
    } else {
      kickLook();
    }
    setTimeout(() => {
      legend.textContent = flipped ? "✦　二 創 區　✦" : "✦　原 創 區　✦";
    }, reduceMotion ? 0 : 650);
  }
  lever.addEventListener("click", flip);
  lever.addEventListener("keydown", e => { if (e.key === "Enter") flip(); });
})();

/* ── 封面頁 ── */
function openBook(kind, idx) {
  const item = kind === "novel" ? novels[idx] : stories[idx];
  const variant = kind === "novel" ? (idx % 4) + 1 : ((idx + 2) % 4) + 1;
  const metaLine = kind === "novel"
    ? item.genre + "　·　共 " + item.chapters.length + " 章　·　最近更新 " + item.chapters[item.chapters.length - 1].date
    : item.genre + "　·　" + item.length + "　·　" + item.date;
  const inner = document.getElementById("book-inner");
  inner.innerHTML = `
    <button class="back-btn" onclick="showView('view-hall')">← 放回書架</button>
    <div class="book-view">
      <div class="cover v${variant}">
        <span class="cover-frame"></span>
        <h2 class="cover-title">${item.title}</h2>
        <span class="cover-pearl"></span>
      </div>
      <div class="book-info">
        ${kind === "novel" ? `<span class="status ${item.status === "已完結" ? "done" : ""}">${item.status}</span>` : ""}
        <p class="meta">${metaLine}</p>
        <p class="blurb">${kind === "novel" ? item.blurb : (item.excerpt || "")}</p>
        <div id="book-actions"></div>
      </div>
    </div>`;
  const actions = inner.querySelector("#book-actions");
  if (kind === "novel") {
    const toc = document.createElement("div");
    toc.className = "toc";
    toc.innerHTML = "<h3>館 藏 目 錄</h3><ol></ol>";
    const list = toc.querySelector("ol");
    item.chapters.forEach((c, ci) => {
      const li = document.createElement("li");
      const btn = document.createElement("button");
      btn.innerHTML = `<span class="name">${c.name}</span><span class="chap-date">${c.date}</span>`;
      btn.addEventListener("click", () => diveInto(() => openChapter(idx, ci)));
      li.appendChild(btn);
      list.appendChild(li);
    });
    actions.appendChild(toc);
  } else {
    const btn = document.createElement("button");
    btn.className = "open-book-btn";
    btn.textContent = "翻開此書 ✦";
    btn.addEventListener("click", () => diveInto(() => openReader(item.title, metaLine, item.file, "view-book")));
    actions.appendChild(btn);
  }
  enableTilt(inner.querySelector(".cover"));
  showView("view-book");
  inner.scrollTop = 0;
}

/* ── 閱讀頁 ── */
function openChapter(ni, ci) {
  const n = novels[ni];
  const c = n.chapters[ci];
  openReader(c.name, n.title + "　·　" + c.date, c.file, "view-book", { ni, ci });
}

async function openReader(title, sub, file, backTo, nav) {
  const inner = document.getElementById("reader-inner");
  inner.innerHTML = `
    <button class="back-btn" id="reader-back">← 返回</button>
    <h2 class="reader-title">${title}</h2>
    <p class="reader-sub">${sub}</p>
    <div class="reader-body"><p style="text-indent:0; color:var(--pearl-dim)">正在打撈文字……</p></div>
    <p class="reader-end"><span class="orn">✦</span>　闔卷於此・潮聲仍在　<span class="orn">✦</span></p>
    <div class="chap-nav" id="chap-nav"></div>`;
  inner.querySelector("#reader-back").addEventListener("click", () => showView(backTo));
  if (nav) {
    const wrap = inner.querySelector("#chap-nav");
    const chaps = novels[nav.ni].chapters;
    if (nav.ci > 0) {
      const prev = document.createElement("button");
      prev.textContent = "← 上一章・" + chaps[nav.ci - 1].name;
      prev.addEventListener("click", () => diveInto(() => openChapter(nav.ni, nav.ci - 1)));
      wrap.appendChild(prev);
    } else {
      wrap.appendChild(document.createElement("span"));
    }
    if (nav.ci < chaps.length - 1) {
      const next = document.createElement("button");
      next.textContent = "下一章・" + chaps[nav.ci + 1].name + " →";
      next.addEventListener("click", () => diveInto(() => openChapter(nav.ni, nav.ci + 1)));
      wrap.appendChild(next);
    }
  }
  showView("view-reader");
  inner.scrollTop = 0;
  try {
    const r = await fetch(file);
    if (!r.ok) throw new Error(r.status);
    const text = await r.text();
    const paras = text.split(/\r?\n+/).map(p => p.trim()).filter(Boolean);
    inner.querySelector(".reader-body").innerHTML = paras.map(p => "<p>" + escapeHtml(p) + "</p>").join("");
  } catch (e) {
    inner.querySelector(".reader-body").innerHTML =
      '<p style="text-indent:0; color:var(--pearl-dim)">找不到內文檔（' + escapeHtml(file) + '）。請確認 works.json 的 file 路徑與 content 資料夾內的檔名一致。</p>';
  }
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

/* ── 入口 ── */
function enterLibrary() { diveInto(() => showView("view-hall")); }
document.getElementById("door").addEventListener("click", enterLibrary);
document.getElementById("door").addEventListener("keydown", e => { if (e.key === "Enter") enterLibrary(); });
document.getElementById("enter-btn").addEventListener("click", enterLibrary);
document.getElementById("back-entrance").addEventListener("click", () => showView("view-entrance"));
document.getElementById("about-nav").addEventListener("click", () => diveInto(() => showView("view-about")));
</script>
